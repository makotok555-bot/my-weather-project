<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイ・お天気チャット</title>
    <style>
        /* CSS: 見た目を整える（青を基調に） */
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); max-width: 80%; }
        .bot-msg { background: #e3f2fd; border-left: 4px solid #2196f3; }
        #input-area { background: white; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div id="chat-window">
        <div class="message">システム：接続を待機中...</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-name" placeholder="名前" style="flex: 0.2;">
        <input type="text" id="message-input" placeholder="メッセージを入力（例: !tenki 1600022）">
        <button onclick="sendMessage()">送信</button>
    </div>

    <script>
        // JS: 動きをつける
        const URL = "wss://tu6qwj3rqi.execute-api.ap-northeast-1.amazonaws.com/production/";
        const socket = new WebSocket(URL);
        const chatWindow = document.getElementById('chat-window');

        // 1. 接続が開いたとき
        socket.onopen = () => {
            addMessage("システム：接続完了！過去ログを取得します...");
            // Java/Pythonで作った gethistory ルートを叩く
            socket.send(JSON.stringify({ action: "gethistory" }));
        };

        // 2. メッセージを受信したとき
        socket.onmessage = (event) => {
            addMessage(event.data);
        };

        // 3. 送信ボタンを押したとき
        function sendMessage() {
            const name = document.getElementById('user-name').value || "名無し";
            const text = document.getElementById('message-input').value;
            
            if (!text) return;

            // PieHostで手打ちしていたJSONを自動生成して送信
            const payload = {
                action: "sendmessage",
                userName: name,
                data: text
            };
            socket.send(JSON.stringify(payload));
            document.getElementById('message-input').value = ""; // 入力欄を空に
        }

        // 画面にメッセージを表示する補助関数
        function addMessage(text) {
            const div = document.createElement('div');
            div.className = 'message';
            if (text.includes('[お天気ボット]')) div.classList.add('bot-msg');
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight; // 最下部へスクロール
        }
    </script>
</body>
</html>
